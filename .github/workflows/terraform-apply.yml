name: terraform apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY to confirm (case-sensitive)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation token
        run: |
          if [[ "${{ inputs.confirm }}" != "APPLY" ]]; then
            echo "::error::Refusing to apply: input 'confirm' must equal APPLY (got '${{ inputs.confirm }}')"
            exit 1
          fi

  apply:
    name: apply
    needs: guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-1
      TF_VAR_telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TF_VAR_telegram_chat_ids: ${{ secrets.TELEGRAM_CHAT_IDS }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=marukyu/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=marukyu-tfstate-lock" \
            -backend-config="encrypt=true"

      - name: terraform plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: terraform apply
        run: terraform apply -no-color -input=false tfplan

      - name: Restart monitor service
        if: always()
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=marukyu-matcha-monitor" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::warning::No running instance found — may be stopped by scheduler"
            exit 0
          fi

          echo "Restarting service on $INSTANCE_ID"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Restart monitor after terraform apply" \
            --parameters 'commands=["systemctl restart marukyu-monitor"]' \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/12] $STATUS"
            case "$STATUS" in
              Success) echo "Service restarted"; exit 0;;
              Failed|TimedOut|Cancelled) echo "::error::Restart failed: $STATUS"; exit 1;;
            esac
          done
          echo "::warning::Timed out waiting for restart (60s)"
